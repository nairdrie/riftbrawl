<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smash — Character Design Showcase</title>
  <style>
    body { margin: 0; overflow: hidden; background: #12141f; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .panel {
      position: fixed; color: #e8eaf2; background: rgba(16, 18, 30, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.09); border-radius: 14px;
      backdrop-filter: blur(8px); padding: 14px 18px;
    }
    #info { top: 18px; left: 18px; max-width: 320px; }
    #info h1 { margin: 0 0 2px; font-size: 17px; letter-spacing: 0.4px; }
    #info .sub { margin: 0 0 10px; font-size: 12px; color: #9aa1b9; }
    #charName { font-size: 21px; font-weight: 700; margin: 0; }
    #charRole { font-size: 12.5px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; margin: 2px 0 8px; }
    #charNotes { margin: 0; padding-left: 18px; font-size: 12.5px; line-height: 1.55; color: #c3c8d9; }
    #controls { bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; align-items: center; }
    button {
      font: 600 13px system-ui, sans-serif; color: #e8eaf2; cursor: pointer;
      background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 9px; padding: 9px 14px; transition: background 0.15s, transform 0.05s;
    }
    button:hover { background: rgba(255, 255, 255, 0.16); }
    button:active { transform: scale(0.96); }
    button .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; vertical-align: 0; }
    button.selected { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.45); }
    .divider { width: 1px; height: 26px; background: rgba(255, 255, 255, 0.15); margin: 0 4px; }
    #hint { bottom: 78px; left: 50%; transform: translateX(-50%); font-size: 11.5px; color: #8e95ad; padding: 6px 14px; }
  </style>
</head>
<body>
  <div id="info" class="panel">
    <h1>Character Design Showcase</h1>
    <p class="sub">Procedural characters &amp; animation — no image or model assets.</p>
    <p id="charName"></p>
    <p id="charRole"></p>
    <ul id="charNotes"></ul>
  </div>
  <div id="hint" class="panel">1 / 2 / 3 select &nbsp;·&nbsp; R walk &nbsp;·&nbsp; Space jump &nbsp;·&nbsp; F attack &nbsp;·&nbsp; X idle</div>
  <div id="controls" class="panel"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ============================================================ helpers
    const lerp = (a, b, t) => a + (b - a) * t;
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const damp = (cur, target, lambda, dt) => lerp(cur, target, 1 - Math.exp(-lambda * dt));
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
    const easeInCubic = (t) => t * t * t;
    const easeOutQuint = (t) => 1 - Math.pow(1 - t, 5);
    const easeOutBack = (t) => { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };

    function mat(color, opts = {}) {
      return new THREE.MeshStandardMaterial(Object.assign({ color, roughness: 0.55, metalness: 0.05 }, opts));
    }
    function addShadows(mesh) { mesh.castShadow = true; mesh.receiveShadow = false; return mesh; }
    function sphere(r, color, opts) { return addShadows(new THREE.Mesh(new THREE.SphereGeometry(r, 24, 18), mat(color, opts))); }
    function box(w, h, d, color, opts) { return addShadows(new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat(color, opts))); }

    // ============================================================ scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x12141f);
    scene.fog = new THREE.Fog(0x12141f, 16, 32);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2.6, 8.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // lights
    scene.add(new THREE.HemisphereLight(0xbcc8ff, 0x33363f, 0.75));
    const key = new THREE.DirectionalLight(0xfff1de, 0.95);
    key.position.set(4, 9, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.left = -9; key.shadow.camera.right = 9;
    key.shadow.camera.top = 9; key.shadow.camera.bottom = -9;
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x5d7bff, 0.55);
    rim.position.set(-6, 4, -6);
    scene.add(rim);

    // stage
    const stage = new THREE.Mesh(
      new THREE.CylinderGeometry(6.5, 7.1, 0.55, 48),
      mat(0xd9dde6, { roughness: 0.9 })
    );
    stage.position.y = -0.275;
    stage.receiveShadow = true;
    scene.add(stage);
    const stageRing = new THREE.Mesh(
      new THREE.RingGeometry(5.9, 6.35, 48),
      new THREE.MeshBasicMaterial({ color: 0x39415c, transparent: true, opacity: 0.55, side: THREE.DoubleSide })
    );
    stageRing.rotation.x = -Math.PI / 2;
    stageRing.position.y = 0.011;
    scene.add(stageRing);

    // ============================================================ effects
    const effects = [];
    function addEffect(e) { effects.push(e); scene.add(e.obj); }
    function disposeObject(obj) {
      obj.traverse((o) => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) o.material.dispose();
      });
    }
    function updateEffects(dt) {
      for (let i = effects.length - 1; i >= 0; i--) {
        const e = effects[i];
        e.t += dt;
        e.update(clamp(e.t / e.life, 0, 1), dt);
        if (e.t >= e.life) {
          scene.remove(e.obj);
          disposeObject(e.obj);
          effects.splice(i, 1);
        }
      }
    }

    function dustRing(pos, color = 0xcfd4e0, maxScale = 4) {
      const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(new THREE.RingGeometry(0.42, 0.56, 36), m);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(pos.x, 0.03, pos.z);
      addEffect({ obj: mesh, t: 0, life: 0.45, update(p) {
        const s = lerp(0.5, maxScale, easeOutCubic(p));
        mesh.scale.set(s, s, s);
        m.opacity = 0.7 * (1 - p);
      } });
    }

    function puffBurst(pos, color, n = 9, speed = 2.4, size = 0.09) {
      const group = new THREE.Group();
      group.position.copy(pos);
      const parts = [];
      for (let i = 0; i < n; i++) {
        const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
        const s = new THREE.Mesh(new THREE.SphereGeometry(size * (0.6 + Math.random() * 0.9), 10, 8), m);
        const th = Math.random() * Math.PI * 2;
        const ph = Math.acos(2 * Math.random() - 1);
        const v = new THREE.Vector3(
          Math.sin(ph) * Math.cos(th), Math.cos(ph), Math.sin(ph) * Math.sin(th)
        ).multiplyScalar(speed * (0.5 + Math.random() * 0.9));
        v.y = Math.abs(v.y) * 0.7 + 0.6;
        group.add(s);
        parts.push({ s, v, m });
      }
      addEffect({ obj: group, t: 0, life: 0.55, update(p, dt) {
        for (const part of parts) {
          part.v.y -= 5 * dt;
          part.s.position.addScaledVector(part.v, dt);
          part.s.scale.setScalar(1 - p);
          part.m.opacity = 0.9 * (1 - p);
        }
      } });
    }

    let shake = 0;
    const addShake = (s) => { shake = Math.max(shake, s); };

    // ============================================================ rig base
    class CharacterRig {
      constructor(homeX) {
        this.root = new THREE.Group();
        this.squash = new THREE.Group();
        this.lean = new THREE.Group();
        this.root.add(this.squash);
        this.squash.add(this.lean);
        scene.add(this.root);

        this.homeX = homeX;
        this.posX = homeX;
        this.lungeX = 0;
        this.walkRange = 1.7;
        this.facing = homeX > 0 ? -1 : 1;
        this.groundY = 0;
        this.state = 'idle';
        this.prevState = 'idle';
        this.stateT = 0;
        this.cycle = 0;
        this.vy = 0;
        this.pupils = [];
        this.blinkAt = 1.5 + Math.random() * 3;

        this.build();
        this.root.position.set(this.posX, this.groundY, 0);
        this.root.rotation.y = this.facing * 0.3;
      }

      setState(s) {
        if (s === this.state) return;
        if (this.state === 'idle' || this.state === 'walk') this.prevState = this.state;
        this.state = s;
        this.stateT = 0;
        this.launched = false;
        if (this.enterState) this.enterState(s);
      }

      setSquash(sy) {
        const sx = 1 / Math.sqrt(Math.max(sy, 0.05));
        this.squash.scale.set(sx, sy, sx);
      }

      walkMove(dt, speed) {
        this.posX += this.facing * speed * dt;
        if (this.posX > this.homeX + this.walkRange) { this.posX = this.homeX + this.walkRange; this.facing = -1; }
        if (this.posX < this.homeX - this.walkRange) { this.posX = this.homeX - this.walkRange; this.facing = 1; }
      }

      blinkUpdate(t) {
        if (!this.pupils.length) return;
        if (t > this.blinkAt + 0.12) this.blinkAt = t + 1.5 + Math.random() * 3.5;
        const closed = t > this.blinkAt && t < this.blinkAt + 0.12;
        for (const p of this.pupils) p.scale.y = closed ? 0.12 : p.userData.scaleY;
      }

      update(dt, t) {
        this.stateT += dt;
        const yawTarget = this.facing * (this.state === 'walk' ? 0.9 : 0.3);
        this.root.rotation.y = damp(this.root.rotation.y, yawTarget, 8, dt);
        this.animate(dt, t);
        this.blinkUpdate(t);
        this.root.position.x = this.posX + this.lungeX;
      }
    }

    // ============================================================ PUFF — the acrobat
    // Round silhouette, fastest timing, overshoot easing on everything.
    class Puff extends CharacterRig {
      build() {
        this.theme = 0xff6fb5;
        const pink = 0xff6fb5, blushC = 0xe0408a, feetC = 0xd6336c;
        const L = this.lean;

        this.body = new THREE.Group();
        this.body.position.y = 0.62;
        L.add(this.body);

        const core = sphere(0.55, pink);
        core.scale.y = 0.95;
        this.body.add(core);

        for (const side of [-1, 1]) {
          const eye = sphere(0.115, 0xffffff, { roughness: 0.25 });
          eye.scale.set(1, 1.7, 0.55);
          eye.position.set(side * 0.21, 0.13, 0.45);
          this.body.add(eye);

          const pupil = sphere(0.06, 0x26233f, { roughness: 0.2 });
          pupil.scale.set(1, 1.5, 0.5);
          pupil.userData.scaleY = 1.5;
          pupil.position.set(side * 0.215, 0.12, 0.53);
          this.body.add(pupil);
          this.pupils.push(pupil);

          const glint = sphere(0.025, 0xffffff, { roughness: 0.1, emissive: 0xffffff, emissiveIntensity: 0.6 });
          glint.position.set(side * 0.19, 0.2, 0.565);
          this.body.add(glint);

          const blush = sphere(0.075, blushC);
          blush.scale.set(1, 0.55, 0.3);
          blush.position.set(side * 0.4, -0.06, 0.4);
          this.body.add(blush);
        }

        const mouth = sphere(0.05, 0x7a1f3d);
        mouth.scale.set(1.5, 1.1, 0.4);
        mouth.position.set(0, -0.13, 0.53);
        this.body.add(mouth);

        this.armL = sphere(0.17, pink);
        this.armL.scale.set(1.1, 0.85, 1);
        this.armL.position.set(-0.52, -0.02, 0.12);
        this.body.add(this.armL);
        this.armR = this.armL.clone();
        this.armR.position.x = 0.52;
        this.body.add(this.armR);

        this.footL = sphere(0.21, feetC);
        this.footL.scale.set(0.95, 0.5, 1.35);
        this.footL.position.set(-0.24, 0.12, 0.1);
        L.add(this.footL);
        this.footR = this.footL.clone();
        this.footR.position.x = 0.24;
        L.add(this.footR);

        // spin-attack smear ring, hidden until used
        this.smearMat = new THREE.MeshBasicMaterial({ color: 0xffb3d6, transparent: true, opacity: 0 });
        this.smear = new THREE.Mesh(new THREE.TorusGeometry(0.78, 0.05, 10, 40), this.smearMat);
        this.smear.rotation.x = Math.PI / 2;
        this.smear.position.y = 0.62;
        L.add(this.smear);
      }

      animate(dt, t) {
        const L = this.lean;
        switch (this.state) {
          case 'idle': {
            this.body.position.y = 0.62 + Math.sin(t * 2.2) * 0.025;
            this.setSquash(1 + Math.sin(t * 2.2) * 0.03);
            this.armL.rotation.z = Math.sin(t * 2.2) * 0.15;
            this.armR.rotation.z = -Math.sin(t * 2.2) * 0.15;
            L.rotation.z = damp(L.rotation.z, 0, 8, dt);
            this.footL.position.y = damp(this.footL.position.y, 0.12, 10, dt);
            this.footR.position.y = damp(this.footR.position.y, 0.12, 10, dt);
            break;
          }
          case 'walk': {
            this.cycle += dt * 16;
            this.walkMove(dt, 2.6);
            L.rotation.z = damp(L.rotation.z, -this.facing * 0.18, 8, dt);
            this.body.position.y = 0.62 + Math.abs(Math.sin(this.cycle)) * 0.06;
            this.setSquash(1 + Math.sin(this.cycle * 2) * 0.02);
            this.footL.position.y = 0.12 + Math.max(0, Math.sin(this.cycle)) * 0.15;
            this.footR.position.y = 0.12 + Math.max(0, -Math.sin(this.cycle)) * 0.15;
            this.armL.position.z = damp(this.armL.position.z, -0.1, 8, dt);
            this.armR.position.z = damp(this.armR.position.z, -0.1, 8, dt);
            break;
          }
          case 'jump': {
            const SQUAT = 0.09;
            if (this.stateT < SQUAT) {
              this.setSquash(lerp(1, 0.76, this.stateT / SQUAT));
            } else {
              if (!this.launched) { this.launched = true; this.vy = 7.4; this.flip = 0; }
              this.root.position.y += this.vy * dt;
              this.vy -= 20 * dt;
              this.setSquash(clamp(1 + this.vy * 0.05, 0.82, 1.3));
              // full somersault over the arc
              this.flip = Math.min(this.flip + dt / 0.72, 1);
              const f = this.flip;
              L.rotation.z = -this.facing * Math.PI * 2 * (f * f * (3 - 2 * f));
              this.armL.rotation.z = 0.9;
              this.armR.rotation.z = -0.9;
              if (this.root.position.y <= this.groundY && this.vy < 0) {
                this.root.position.y = this.groundY;
                L.rotation.z = 0;
                this.armL.rotation.z = 0; this.armR.rotation.z = 0;
                dustRing(this.root.position, 0xffc6de, 2.2);
                this.setState('land');
              }
            }
            break;
          }
          case 'land': {
            const p = clamp(this.stateT / 0.22, 0, 1);
            this.setSquash(lerp(0.68, 1, easeOutBack(p)));
            if (p >= 1) this.setState(this.prevState);
            break;
          }
          case 'attack': {
            // spin slap: two quick revolutions with arms out, smear ring while fast
            const DUR = 0.5;
            const p = clamp(this.stateT / DUR, 0, 1);
            const spin = easeOutQuint(p);
            this.body.rotation.y = this.facing * Math.PI * 4 * spin;
            const arm = Math.sin(Math.min(p * 2, 1) * Math.PI);
            this.armL.position.x = -0.52 - arm * 0.26;
            this.armR.position.x = 0.52 + arm * 0.26;
            this.setSquash(1 - arm * 0.07);
            this.smearMat.opacity = arm * 0.55;
            this.smear.scale.setScalar(1 + arm * 0.1);
            if (p >= 1) {
              this.body.rotation.y = 0;
              this.armL.position.x = -0.52; this.armR.position.x = 0.52;
              this.smearMat.opacity = 0;
              this.setState(this.prevState);
            }
            break;
          }
        }
      }
    }

    // ============================================================ MAGNUS — the juggernaut
    // Massive blocky silhouette. Heavy anticipation, sharp strikes, big follow-through.
    class Magnus extends CharacterRig {
      build() {
        this.theme = 0xff7a3d;
        const stone = 0x8f969f, dark = 0x565d66, darker = 0x3f444b;
        const coreC = 0xff7a3d, moss = 0x6fae5c, eyeC = 0xffc24d;
        const L = this.lean;

        const pelvis = box(0.62, 0.28, 0.46, dark);
        pelvis.position.set(0, 0.48, 0);
        L.add(pelvis);

        for (const side of [-1, 1]) {
          const leg = box(0.26, 0.34, 0.3, dark);
          leg.position.set(side * 0.19, 0.24, 0);
          L.add(leg);
          const foot = box(0.32, 0.14, 0.44, darker);
          foot.position.set(side * 0.19, 0.07, 0.03);
          L.add(foot);
        }

        this.torso = new THREE.Group();
        this.torso.position.y = 0.95;
        L.add(this.torso);

        const chest = box(0.95, 0.75, 0.6, stone);
        chest.position.y = 0.05;
        this.torso.add(chest);

        this.coreMat = mat(coreC, { emissive: coreC, emissiveIntensity: 1.2, roughness: 0.3 });
        const core = addShadows(new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.26, 0.08), this.coreMat));
        core.position.set(0, 0.02, 0.29);
        this.torso.add(core);

        for (const side of [-1, 1]) {
          const slab = box(0.4, 0.34, 0.42, stone);
          slab.position.set(side * 0.66, 0.38, 0);
          this.torso.add(slab);

          const armPivot = new THREE.Group();
          armPivot.position.set(side * 0.68, 0.24, 0);
          this.torso.add(armPivot);
          const arm = box(0.27, 0.5, 0.27, stone);
          arm.position.y = -0.28;
          armPivot.add(arm);
          const fist = box(0.36, 0.3, 0.34, dark);
          fist.position.y = -0.62;
          armPivot.add(fist);
          if (side === -1) { this.armL = armPivot; } else { this.armR = armPivot; this.fistR = fist; }
        }

        const mossShoulder = box(0.2, 0.07, 0.22, moss);
        mossShoulder.position.set(0.66, 0.58, 0.05);
        this.torso.add(mossShoulder);

        this.head = new THREE.Group();
        this.head.position.y = 0.62;
        this.torso.add(this.head);
        const skull = box(0.44, 0.34, 0.4, stone);
        this.head.add(skull);
        const brow = box(0.48, 0.09, 0.42, darker);
        brow.position.set(0, 0.13, 0.02);
        this.head.add(brow);
        const mossHead = box(0.16, 0.06, 0.18, moss);
        mossHead.position.set(-0.13, 0.2, -0.05);
        this.head.add(mossHead);
        this.eyeMats = [];
        for (const side of [-1, 1]) {
          const eMat = mat(0x1a1108, { emissive: eyeC, emissiveIntensity: 1.6 });
          const eye = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 0.03), eMat);
          eye.position.set(side * 0.11, 0.015, 0.205);
          this.head.add(eye);
          this.eyeMats.push(eMat);
        }
        this.lastStepSign = 1;
      }

      animate(dt, t) {
        const L = this.lean;
        this.coreMat.emissiveIntensity = 1.1 + Math.sin(t * 2.3) * 0.45;
        switch (this.state) {
          case 'idle': {
            this.torso.position.y = 0.95 + Math.sin(t * 1.1) * 0.02;
            this.armL.rotation.x = Math.sin(t * 1.1) * 0.05;
            this.armR.rotation.x = damp(this.armR.rotation.x, Math.sin(t * 1.1) * 0.05, 6, dt);
            this.head.rotation.y = Math.sin(t * 0.4) * 0.18;
            this.torso.rotation.y = damp(this.torso.rotation.y, 0, 6, dt);
            L.rotation.z = damp(L.rotation.z, 0, 6, dt);
            this.setSquash(damp(this.squash.scale.y, 1, 10, dt));
            break;
          }
          case 'walk': {
            this.cycle += dt * 4.4;
            this.walkMove(dt, 1.25);
            L.rotation.z = Math.sin(this.cycle) * 0.06;
            this.torso.position.y = 0.95 + Math.pow(Math.abs(Math.sin(this.cycle)), 0.6) * 0.055;
            this.armL.rotation.x = Math.sin(this.cycle) * 0.45;
            this.armR.rotation.x = -Math.sin(this.cycle) * 0.45;
            const sign = Math.sign(Math.sin(this.cycle)) || 1;
            if (sign !== this.lastStepSign) {
              this.lastStepSign = sign;
              const p = this.root.position.clone();
              p.x += this.facing * 0.25;
              puffBurst(new THREE.Vector3(p.x, 0.08, p.z), 0xb9bfc9, 4, 0.9, 0.06);
              addShake(0.012);
            }
            break;
          }
          case 'jump': {
            const SQUAT = 0.26;
            if (this.stateT < SQUAT) {
              this.setSquash(lerp(1, 0.72, easeOutCubic(this.stateT / SQUAT)));
              this.armL.rotation.x = lerp(0, 0.9, this.stateT / SQUAT);
              this.armR.rotation.x = lerp(0, 0.9, this.stateT / SQUAT);
            } else {
              if (!this.launched) { this.launched = true; this.vy = 8.2; }
              this.root.position.y += this.vy * dt;
              this.vy -= 24 * dt;
              this.setSquash(clamp(1 + this.vy * 0.03, 0.85, 1.18));
              this.armL.rotation.x = damp(this.armL.rotation.x, -2.4, 8, dt);
              this.armR.rotation.x = damp(this.armR.rotation.x, -2.4, 8, dt);
              if (this.root.position.y <= this.groundY && this.vy < 0) {
                this.root.position.y = this.groundY;
                dustRing(this.root.position, 0xcfd4e0, 5);
                puffBurst(new THREE.Vector3(this.root.position.x, 0.1, this.root.position.z), 0xb9bfc9, 12, 2.6, 0.1);
                addShake(0.12);
                this.setState('land');
              }
            }
            break;
          }
          case 'land': {
            const p = clamp(this.stateT / 0.32, 0, 1);
            this.setSquash(lerp(0.6, 1, easeOutBack(p)));
            this.armL.rotation.x = lerp(0.7, 0, p);
            this.armR.rotation.x = lerp(0.7, 0, p);
            if (p >= 1) this.setState(this.prevState);
            break;
          }
          case 'attack': {
            // haymaker: long wind-up, instant strike, hold, slow recovery
            const W = 0.38, S = 0.09, H = 0.12, R = 0.35;
            const tt = this.stateT;
            if (tt < W) {
              const p = easeOutCubic(tt / W);
              this.armR.rotation.x = lerp(0, -2.6, p);
              this.torso.rotation.y = lerp(0, -this.facing * 0.45, p);
              L.rotation.z = lerp(0, this.facing * 0.07, p);
              this.setSquash(lerp(1, 0.95, p));
              this.eyeMats.forEach((m) => { m.emissiveIntensity = 1.6 + p * 1.6; });
            } else if (tt < W + S) {
              const p = easeOutQuint((tt - W) / S);
              this.armR.rotation.x = lerp(-2.6, 1.45, p);
              this.torso.rotation.y = lerp(-this.facing * 0.45, this.facing * 0.5, p);
              L.rotation.z = lerp(this.facing * 0.07, -this.facing * 0.1, p);
              this.lungeX = this.facing * 0.38 * p;
              if (!this.struck && p > 0.9) {
                this.struck = true;
                const fp = new THREE.Vector3();
                this.fistR.getWorldPosition(fp);
                puffBurst(fp, 0xffd27a, 10, 3.2, 0.08);
                addShake(0.1);
              }
            } else if (tt < W + S + H) {
              // hold the extended pose — follow-through reads the hit
            } else {
              const p = clamp((tt - W - S - H) / R, 0, 1);
              this.armR.rotation.x = lerp(1.45, 0, easeOutCubic(p));
              this.torso.rotation.y = lerp(this.facing * 0.5, 0, easeOutCubic(p));
              L.rotation.z = lerp(-this.facing * 0.1, 0, p);
              this.lungeX = this.facing * 0.38 * (1 - p);
              this.setSquash(lerp(0.95, 1, p));
              this.eyeMats.forEach((m) => { m.emissiveIntensity = lerp(3.2, 1.6, p); });
              if (p >= 1) { this.struck = false; this.lungeX = 0; this.setState(this.prevState); }
            }
            break;
          }
        }
      }
    }

    // ============================================================ WISP — the phantom zoner
    // Tapered floating silhouette. Never touches the ground; pure sine motion, teleports.
    class Wisp extends CharacterRig {
      build() {
        this.theme = 0x67e8f9;
        this.groundY = 0.55; // hover height
        const bodyC = 0x7b6cf6, hoodC = 0x241c4a, trim = 0x67e8f9, handC = 0xb1a7ff;
        const L = this.lean;

        const head = sphere(0.3, bodyC, { transparent: true, opacity: 0.95, roughness: 0.35 });
        head.position.y = 1.05;
        L.add(head);

        const tailCone = addShadows(new THREE.Mesh(
          new THREE.ConeGeometry(0.295, 0.85, 24),
          mat(bodyC, { transparent: true, opacity: 0.85, roughness: 0.35 })
        ));
        tailCone.rotation.x = Math.PI;
        tailCone.position.y = 0.63;
        L.add(tailCone);

        this.hat = new THREE.Group();
        this.hat.position.y = 1.22;
        L.add(this.hat);
        const cone = addShadows(new THREE.Mesh(new THREE.ConeGeometry(0.34, 0.55, 24), mat(hoodC, { roughness: 0.7 })));
        cone.position.y = 0.24;
        this.hat.add(cone);
        const brim = addShadows(new THREE.Mesh(new THREE.TorusGeometry(0.36, 0.06, 12, 28), mat(hoodC, { roughness: 0.7 })));
        brim.rotation.x = Math.PI / 2;
        this.hat.add(brim);
        const bobble = sphere(0.07, trim, { emissive: trim, emissiveIntensity: 1.4 });
        bobble.position.y = 0.55;
        this.hat.add(bobble);

        for (const side of [-1, 1]) {
          const eye = sphere(0.06, trim, { emissive: 0x9ff7ff, emissiveIntensity: 2.2, roughness: 0.2 });
          eye.scale.set(1, 1.55, 0.5);
          eye.userData.scaleY = 1.55;
          eye.position.set(side * 0.115, 1.07, 0.245);
          L.add(eye);
          this.pupils.push(eye); // reuse blink system
        }

        this.handHome = [new THREE.Vector3(-0.42, 0.78, 0.18), new THREE.Vector3(0.42, 0.78, 0.18)];
        this.hands = this.handHome.map((p) => {
          const h = sphere(0.095, handC, { transparent: true, opacity: 0.95, roughness: 0.35 });
          h.position.copy(p);
          L.add(h);
          return h;
        });

        // charge orb (hidden until attack)
        this.orbMat = mat(0x67e8f9, { emissive: 0x67e8f9, emissiveIntensity: 2.5, transparent: true, opacity: 0.95 });
        this.orb = new THREE.Mesh(new THREE.SphereGeometry(1, 18, 14), this.orbMat);
        this.orb.position.set(0, 0.82, 0.5);
        this.orb.scale.setScalar(0.001);
        this.orb.visible = false;
        L.add(this.orb);

        // ghost tail followers live in world space so they lag behind movement
        this.tail = [0.13, 0.09, 0.055].map((r, i) => {
          const s = new THREE.Mesh(
            new THREE.SphereGeometry(r, 14, 12),
            mat(bodyC, { transparent: true, opacity: 0.62 - i * 0.16, roughness: 0.4 })
          );
          scene.add(s);
          s.position.set(this.homeX, 0.5, 0);
          return s;
        });
      }

      animate(dt, t) {
        const L = this.lean;
        // tail always trails the body with increasing lag
        for (let i = 0; i < this.tail.length; i++) {
          const tgt = new THREE.Vector3(
            this.root.position.x - this.facing * 0.22 * (i + 1),
            this.root.position.y - 0.18 + Math.sin(t * 3 - i * 1.1) * 0.05 - i * 0.07,
            this.root.position.z
          );
          this.tail[i].position.lerp(tgt, 1 - Math.exp(-(9 - i * 2.4) * dt));
          this.tail[i].visible = this.lean.visible !== false && this.squash.scale.y > 0.05;
        }

        switch (this.state) {
          case 'idle': {
            L.position.y = Math.sin(t * 2.6) * 0.085;
            L.rotation.z = damp(L.rotation.z, Math.sin(t * 1.3) * 0.05, 6, dt);
            this.hat.rotation.z = 0.1 + Math.sin(t * 1.7) * 0.06;
            this.hands[0].position.y = this.handHome[0].y + Math.sin(t * 2.6 + 0.8) * 0.06;
            this.hands[1].position.y = this.handHome[1].y + Math.sin(t * 2.6 - 0.8) * 0.06;
            this.hands[0].position.x = damp(this.hands[0].position.x, this.handHome[0].x, 8, dt);
            this.hands[1].position.x = damp(this.hands[1].position.x, this.handHome[1].x, 8, dt);
            this.hands[0].position.z = damp(this.hands[0].position.z, this.handHome[0].z, 8, dt);
            this.hands[1].position.z = damp(this.hands[1].position.z, this.handHome[1].z, 8, dt);
            break;
          }
          case 'walk': {
            this.walkMove(dt, 2.0);
            L.position.y = Math.sin(t * 4) * 0.05;
            L.rotation.z = damp(L.rotation.z, -this.facing * 0.22, 6, dt);
            this.hat.rotation.z = 0.1 + Math.sin(t * 3) * 0.05;
            this.hands[0].position.z = damp(this.hands[0].position.z, -0.12, 6, dt);
            this.hands[1].position.z = damp(this.hands[1].position.z, -0.12, 6, dt);
            break;
          }
          case 'jump': {
            // teleport: blink out, reappear above, drift down like a feather
            const OUT = 0.16, IN = 0.16;
            if (this.stateT < OUT) {
              const p = easeInCubic(this.stateT / OUT);
              this.setSquash(Math.max(1 - p, 0.001));
              L.rotation.y += dt * 22;
              if (!this.popped && p > 0.95) {
                this.popped = true;
                puffBurst(new THREE.Vector3(this.root.position.x, this.root.position.y + 0.8, 0), 0x67e8f9, 10, 2.2, 0.07);
                this.root.position.y += 1.9;
              }
            } else if (this.stateT < OUT + IN) {
              const p = easeOutBack((this.stateT - OUT) / IN);
              this.setSquash(Math.max(p, 0.001));
              L.rotation.y = damp(L.rotation.y, 0, 12, dt);
              if (!this.reappeared) {
                this.reappeared = true;
                puffBurst(new THREE.Vector3(this.root.position.x, this.root.position.y + 0.8, 0), 0x9ff7ff, 8, 1.8, 0.06);
              }
            } else {
              this.setSquash(1);
              L.rotation.y = 0;
              this.vy -= 3.2 * dt;
              this.root.position.y += this.vy * dt;
              L.position.x = Math.sin(this.stateT * 5) * 0.07;
              if (this.root.position.y <= this.groundY) {
                this.root.position.y = this.groundY;
                this.vy = 0;
                this.popped = false; this.reappeared = false;
                L.position.x = 0;
                this.setState(this.prevState);
              }
            }
            break;
          }
          case 'attack': {
            // charge an orb between the hands, then fling it
            const C = 0.5, R = 0.35;
            const tt = this.stateT;
            if (tt < C) {
              const p = easeOutCubic(tt / C);
              this.orb.visible = true;
              const flicker = 1 + Math.sin(tt * 40) * 0.12 * p;
              this.orb.scale.setScalar(Math.max(0.17 * p * flicker, 0.001));
              for (let i = 0; i < 2; i++) {
                this.hands[i].position.lerp(new THREE.Vector3((i === 0 ? -1 : 1) * 0.16, 0.82, 0.42), 1 - Math.exp(-10 * dt));
              }
              L.position.z = -0.06 * p;
            } else {
              if (!this.fired) {
                this.fired = true;
                const start = new THREE.Vector3();
                this.orb.getWorldPosition(start);
                this.orb.visible = false;
                this.spawnProjectile(start);
                addShake(0.03);
              }
              const p = clamp((tt - C) / R, 0, 1);
              L.position.z = lerp(-0.2, 0, easeOutCubic(p));
              for (let i = 0; i < 2; i++) {
                this.hands[i].position.lerp(this.handHome[i], 1 - Math.exp(-8 * dt));
              }
              if (p >= 1) { this.fired = false; L.position.z = 0; this.setState(this.prevState); }
            }
            break;
          }
        }
      }

      spawnProjectile(start) {
        const m = mat(0x67e8f9, { emissive: 0x67e8f9, emissiveIntensity: 2.5, transparent: true, opacity: 0.95 });
        const orb = new THREE.Mesh(new THREE.SphereGeometry(0.16, 18, 14), m);
        orb.position.copy(start);
        const light = new THREE.PointLight(0x67e8f9, 1.1, 5);
        orb.add(light);
        const dir = this.facing;
        addEffect({ obj: orb, t: 0, life: 1.5, update(p, dt) {
          orb.position.x += dir * 8 * dt;
          orb.position.y += Math.sin(p * 26) * 0.012;
          orb.scale.setScalar(1 + Math.sin(p * 40) * 0.08);
          if (p > 0.82) { m.opacity = 0.95 * (1 - (p - 0.82) / 0.18); light.intensity = 1.1 * (1 - (p - 0.82) / 0.18); }
        } });
      }
    }

    // ============================================================ roster + UI
    const roster = [
      {
        rig: new Puff(-3.1), name: 'Puff', role: 'The Acrobat',
        notes: [
          'Round silhouette, biggest eyes, fastest timing',
          'Overshoot easing — everything bounces',
          'Somersault jumps, spin-slap attack',
        ],
      },
      {
        rig: new Magnus(0), name: 'Magnus', role: 'The Juggernaut',
        notes: [
          'Blocky silhouette, huge shoulders, tiny head',
          'Heavy anticipation, sharp strikes, long recovery',
          'Footsteps and landings shake the screen',
        ],
      },
      {
        rig: new Wisp(3.1), name: 'Wisp', role: 'The Phantom Zoner',
        notes: [
          'Tapered floating silhouette — no legs at all',
          'Pure sine motion, never touches the ground',
          'Teleport "jump", charged orb projectile',
        ],
      },
    ];

    let selected = 0;
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85, side: THREE.DoubleSide });
    const selRing = new THREE.Mesh(new THREE.RingGeometry(0.62, 0.72, 40), ringMat);
    selRing.rotation.x = -Math.PI / 2;
    selRing.position.y = 0.02;
    scene.add(selRing);

    const controls = document.getElementById('controls');
    const charButtons = roster.map((c, i) => {
      const b = document.createElement('button');
      b.innerHTML = `<span class="dot" style="background:#${c.rig.theme.toString(16).padStart(6, '0')}"></span>${c.name}`;
      b.onclick = () => select(i);
      controls.appendChild(b);
      return b;
    });
    const div = document.createElement('div');
    div.className = 'divider';
    controls.appendChild(div);
    for (const [label, fn] of [
      ['Walk', () => toggleWalk()],
      ['Jump', () => trigger('jump')],
      ['Attack', () => trigger('attack')],
      ['Idle', () => roster[selected].rig.setState('idle')],
    ]) {
      const b = document.createElement('button');
      b.textContent = label;
      b.onclick = fn;
      controls.appendChild(b);
    }

    function select(i) {
      selected = i;
      charButtons.forEach((b, j) => b.classList.toggle('selected', j === i));
      const c = roster[i];
      document.getElementById('charName').textContent = c.name;
      document.getElementById('charName').style.color = `#${c.rig.theme.toString(16).padStart(6, '0')}`;
      document.getElementById('charRole').textContent = c.role;
      document.getElementById('charRole').style.color = `#${c.rig.theme.toString(16).padStart(6, '0')}`;
      document.getElementById('charNotes').innerHTML = c.notes.map((n) => `<li>${n}</li>`).join('');
      ringMat.color.setHex(c.rig.theme);
    }
    function trigger(s) {
      const r = roster[selected].rig;
      if (r.state === 'idle' || r.state === 'walk') r.setState(s);
    }
    function toggleWalk() {
      const r = roster[selected].rig;
      if (r.state === 'idle') r.setState('walk');
      else if (r.state === 'walk') r.setState('idle');
    }
    select(0);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Digit1') select(0);
      if (e.code === 'Digit2') select(1);
      if (e.code === 'Digit3') select(2);
      if (e.code === 'Space') { e.preventDefault(); trigger('jump'); }
      if (e.code === 'KeyF') trigger('attack');
      if (e.code === 'KeyR') toggleWalk();
      if (e.code === 'KeyX') roster[selected].rig.setState('idle');
    });

    // ============================================================ loop
    const clock = new THREE.Clock();
    function loop() {
      requestAnimationFrame(loop);
      const dt = Math.min(clock.getDelta(), 0.05);
      const t = clock.elapsedTime;

      for (const c of roster) c.rig.update(dt, t);
      updateEffects(dt);

      const sel = roster[selected].rig;
      selRing.position.x = damp(selRing.position.x, sel.root.position.x, 12, dt);
      const pulse = 1 + Math.sin(t * 4) * 0.05;
      selRing.scale.set(pulse, pulse, pulse);

      shake = damp(shake, 0, 6, dt);
      camera.position.x = Math.sin(t * 0.13) * 0.35 + (Math.random() - 0.5) * shake;
      camera.position.y = 2.6 + (Math.random() - 0.5) * shake;
      camera.lookAt(0, 1.05, 0);

      renderer.render(scene, camera);
    }
    loop();
  </script>
</body>
</html>
