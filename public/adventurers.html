<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smash — The Adventurers</title>
  <style>
    body { margin: 0; overflow: hidden; background: #12141f; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .panel {
      position: fixed; color: #e8eaf2; background: rgba(16, 18, 30, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.09); border-radius: 14px;
      backdrop-filter: blur(8px); padding: 14px 18px;
    }
    #info { top: 18px; left: 18px; max-width: 330px; }
    #info h1 { margin: 0 0 2px; font-size: 17px; letter-spacing: 0.4px; }
    #info .sub { margin: 0 0 10px; font-size: 12px; color: #9aa1b9; }
    #charName { font-size: 21px; font-weight: 700; margin: 0; }
    #charRole { font-size: 12.5px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; margin: 2px 0 8px; }
    #charNotes { margin: 0; padding-left: 18px; font-size: 12.5px; line-height: 1.55; color: #c3c8d9; }
    #controls { bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; align-items: center; }
    button {
      font: 600 13px system-ui, sans-serif; color: #e8eaf2; cursor: pointer;
      background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 9px; padding: 9px 14px; transition: background 0.15s, transform 0.05s;
    }
    button:hover { background: rgba(255, 255, 255, 0.16); }
    button:active { transform: scale(0.96); }
    button .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; }
    button.selected { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.45); }
    .divider { width: 1px; height: 26px; background: rgba(255, 255, 255, 0.15); margin: 0 4px; }
    #hint { bottom: 78px; left: 50%; transform: translateX(-50%); font-size: 11.5px; color: #8e95ad; padding: 6px 14px; }
    #loading {
      top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 15px; color: #c3c8d9;
      padding: 18px 28px; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="info" class="panel">
    <h1>The Adventurers</h1>
    <p class="sub">KayKit character pack (CC0) · skeletal animation via THREE.AnimationMixer</p>
    <p id="charName"></p>
    <p id="charRole"></p>
    <ul id="charNotes"></ul>
  </div>
  <div id="hint" class="panel">1-4 select · R run · Space jump · F attack · G special · H hit · K ko · X idle</div>
  <div id="controls" class="panel"></div>
  <div id="loading" class="panel">Loading adventurers…</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="lib/GLTFLoader.js"></script>
  <script>
    // ============================================================ helpers
    const lerp = (a, b, t) => a + (b - a) * t;
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const damp = (cur, target, lambda, dt) => lerp(cur, target, 1 - Math.exp(-lambda * dt));
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

    // ============================================================ scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x12141f);
    scene.fog = new THREE.Fog(0x12141f, 16, 32);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2.7, 9.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    scene.add(new THREE.HemisphereLight(0xbcc8ff, 0x33363f, 0.85));
    const key = new THREE.DirectionalLight(0xfff1de, 1.0);
    key.position.set(4, 9, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.left = -9; key.shadow.camera.right = 9;
    key.shadow.camera.top = 9; key.shadow.camera.bottom = -9;
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x5d7bff, 0.5);
    rim.position.set(-6, 4, -6);
    scene.add(rim);

    const stage = new THREE.Mesh(
      new THREE.CylinderGeometry(6.5, 7.1, 0.55, 48),
      new THREE.MeshStandardMaterial({ color: 0xd9dde6, roughness: 0.9 })
    );
    stage.position.y = -0.275;
    stage.receiveShadow = true;
    scene.add(stage);

    // ============================================================ effects
    const effects = [];
    function addEffect(e) { effects.push(e); scene.add(e.obj); }
    function updateEffects(dt) {
      for (let i = effects.length - 1; i >= 0; i--) {
        const e = effects[i];
        e.t += dt;
        e.update(clamp(e.t / e.life, 0, 1), dt);
        if (e.t >= e.life) {
          scene.remove(e.obj);
          e.obj.traverse((o) => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
          effects.splice(i, 1);
        }
      }
    }
    function dustRing(pos, color = 0xcfd4e0, maxScale = 3) {
      const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(new THREE.RingGeometry(0.42, 0.56, 36), m);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(pos.x, 0.03, pos.z);
      addEffect({ obj: mesh, t: 0, life: 0.45, update(p) {
        const s = lerp(0.5, maxScale, easeOutCubic(p));
        mesh.scale.set(s, s, s);
        m.opacity = 0.7 * (1 - p);
      } });
    }
    function puffBurst(pos, color, n = 9, speed = 2.2, size = 0.09, life = 0.55) {
      const group = new THREE.Group();
      group.position.copy(pos);
      const parts = [];
      for (let i = 0; i < n; i++) {
        const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
        const s = new THREE.Mesh(new THREE.SphereGeometry(size * (0.6 + Math.random() * 0.9), 10, 8), m);
        const th = Math.random() * Math.PI * 2;
        const ph = Math.acos(2 * Math.random() - 1);
        const v = new THREE.Vector3(Math.sin(ph) * Math.cos(th), Math.cos(ph), Math.sin(ph) * Math.sin(th))
          .multiplyScalar(speed * (0.5 + Math.random() * 0.9));
        v.y = Math.abs(v.y) * 0.7 + 0.4;
        group.add(s);
        parts.push({ s, v, m });
      }
      addEffect({ obj: group, t: 0, life, update(p, dt) {
        for (const part of parts) {
          part.v.y -= 4 * dt;
          part.s.position.addScaledVector(part.v, dt);
          part.s.scale.setScalar(Math.max(1 - p, 0.01));
          part.m.opacity = 0.9 * (1 - p);
        }
      } });
    }
    function magicBolt(start, dir, color, radius = 0.14, speed = 8) {
      const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.95 });
      const orb = new THREE.Mesh(new THREE.SphereGeometry(radius, 16, 12), m);
      orb.position.copy(start);
      const light = new THREE.PointLight(color, 1.1, 5);
      orb.add(light);
      addEffect({ obj: orb, t: 0, life: 1.4, update(p, dt) {
        orb.position.x += dir * speed * dt;
        orb.scale.setScalar(1 + Math.sin(p * 40) * 0.08);
        if (p > 0.8) { m.opacity = 0.95 * (1 - (p - 0.8) / 0.2); light.intensity = 1.1 * (1 - (p - 0.8) / 0.2); }
      } });
    }

    let shake = 0;
    const addShake = (s) => { shake = Math.max(shake, s); };

    // ============================================================ the roster
    // Kits are designed around verbs, not stats — see docs/CHARACTER_DESIGN.md.
    const ROSTER = [
      {
        file: 'Knight.glb', name: 'Bastion', role: 'The Bulwark', color: 0x7aa2ff,
        show: ['1H_Sword', 'Badge_Shield'],
        runSpeed: 1.5, runTS: 0.95, jumpVel: 6.0,
        attack: { clip: '1H_Melee_Attack_Slice_Diagonal', ts: 1.1 },
        special: { clip: 'Block_Attack', ts: 1.0, kind: 'bash' },
        notes: [
          'Block stance: hold to stand your ground — no flinch, no knockback',
          'Shield Bash: the only attack that works mid-block',
          'Slow, short jumps, heaviest shield. Wins by attrition at the ledge.',
        ],
      },
      {
        file: 'Barbarian.glb', name: 'Korga', role: 'The Avalanche', color: 0xff8a5c,
        show: ['2H_Axe'],
        runSpeed: 1.9, runTS: 1.05, jumpVel: 6.6,
        attack: { clip: '2H_Melee_Attack_Chop', ts: 1.0 },
        special: { clip: '2H_Melee_Attack_Spinning', ts: 1.0, kind: 'whirlwind' },
        notes: [
          'Rage: taking hits charges her next swing — armor plus bonus knockback',
          'Whirlwind: a moving multi-hit; she keeps rolling forward through you',
          'No block, no fear. Trades damage, never backs up.',
        ],
      },
      {
        file: 'Mage.glb', name: 'Elara', role: 'The Tempest', color: 0x9b8cff,
        show: ['2H_Staff'],
        runSpeed: 1.6, runTS: 1.0, jumpVel: 6.2,
        attack: { clip: 'Spellcast_Shoot', ts: 1.15, kind: 'cast', boltAt: 0.45, boltR: 0.13 },
        special: { clip: 'Spellcast_Long', ts: 1.0, kind: 'cast', boltAt: 1.15, boltR: 0.26 },
        notes: [
          'Charged bolts: tap for a poke, hold for a screen-crossing blast',
          'Blink: a short teleport replaces her dodge — vanish through attacks',
          'Helpless up close: her punch is the worst move in the game (on purpose)',
        ],
      },
      {
        file: 'Rogue_Hooded.glb', name: 'Whisper', role: 'The Phantom Blade', color: 0x8be28b,
        show: ['Knife', 'Knife_Offhand'],
        runSpeed: 2.6, runTS: 1.25, jumpVel: 7.0,
        attack: { clip: 'Dualwield_Melee_Attack_Slice', ts: 1.3 },
        special: { clip: 'Throw', ts: 1.2, kind: 'smoke' },
        notes: [
          'Dagger flurry: fastest hands in the game, weakest single hits',
          'Backstab: strikes from behind hit twice as hard',
          'Smoke bomb: vanish for a second — reposition, bait, betray',
        ],
      },
    ];
    const HOMES = [-4.0, -1.35, 1.35, 4.0];

    // ============================================================ character
    class Adventurer {
      constructor(def, homeX) {
        this.def = def;
        this.homeX = homeX;
        this.posX = homeX;
        this.lungeX = 0;
        this.walkRange = 1.1;
        this.facing = homeX > 0 ? -1 : 1;
        this.mode = 'idle';        // idle | run | jump | acting
        this.vy = 0;
        this.ghostT = 0;
        this.waitT = 0;
        this.waitNext = null;
        this.root = new THREE.Group();
        this.root.position.set(homeX, 0, 0);
        this.root.rotation.y = this.facing * 0.35;
        scene.add(this.root);
        this.ready = false;
      }

      async load(loader) {
        const gltf = await new Promise((res, rej) =>
          loader.load(`assets/kaykit/${this.def.file}`, res, undefined, rej));
        this.model = gltf.scene;
        this.mats = [];
        // Every weapon variant ships inside the GLB, rigged to the hands —
        // a kit is defined by which props it leaves visible.
        const PROP_RE = /Sword|Shield|Axe|Mug|Spellbook|Wand|Staff|Crossbow|Knife|Throwable/i;
        this.model.traverse((o) => {
          if (o.isMesh) {
            o.castShadow = true;
            o.frustumCulled = false;
            for (const m of Array.isArray(o.material) ? o.material : [o.material]) {
              if (!this.mats.includes(m)) this.mats.push(m);
            }
          }
          if (PROP_RE.test(o.name)) o.visible = this.def.show.includes(o.name);
        });
        this.throwable = this.model.getObjectByName('Throwable');
        this.root.add(this.model);

        this.mixer = new THREE.AnimationMixer(this.model);
        this.actions = {};
        for (const clip of gltf.animations) this.actions[clip.name] = this.mixer.clipAction(clip);
        this.mixer.addEventListener('finished', (e) => {
          if (e.action === this.onceAction && this.onDone) {
            const cb = this.onDone;
            this.onDone = null;
            cb();
          }
        });

        this.playLoop('Idle');
        this.ready = true;
      }

      playLoop(name, fade = 0.22, timeScale = 1) {
        const next = this.actions[name];
        if (!next) return;
        if (this.loopName === name && !this.onceAction) return;
        next.reset().setLoop(THREE.LoopRepeat, Infinity).setEffectiveTimeScale(timeScale).setEffectiveWeight(1).play();
        const prev = this.onceAction || (this.loopName && this.actions[this.loopName]);
        if (prev && prev !== next) prev.crossFadeTo(next, fade, false);
        this.loopName = name;
        this.onceAction = null;
      }

      playOnce(name, { fade = 0.15, ts = 1, onDone = null } = {}) {
        const a = this.actions[name];
        if (!a) return;
        a.reset().setLoop(THREE.LoopOnce, 1);
        a.clampWhenFinished = true;
        a.setEffectiveTimeScale(ts).setEffectiveWeight(1).play();
        const prev = this.onceAction || (this.loopName && this.actions[this.loopName]);
        if (prev && prev !== a) prev.crossFadeTo(a, fade, false);
        this.onceAction = a;
        this.onDone = onDone;
      }

      resumeLoop() {
        const name = this.mode === 'run' ? 'Running_A' : 'Idle';
        this.loopName = null; // force restart of the loop action
        this.playLoop(name, 0.25, this.mode === 'run' ? this.def.runTS : 1);
      }

      get busy() {
        if (this.waitT > 0) return true;
        if (this.mode === 'acting' && this.actKind === 'cheer') return false; // cheer is interruptible
        return this.mode === 'jump' || this.mode === 'acting';
      }

      // ---- triggers ----
      toggleRun() {
        if (this.busy) return;
        this.mode = this.mode === 'run' ? 'idle' : 'run';
        this.playLoop(this.mode === 'run' ? 'Running_A' : 'Idle', 0.22, this.mode === 'run' ? this.def.runTS : 1);
      }
      jump() {
        if (this.busy) return;
        this.mode = 'jump';
        this.vy = this.def.jumpVel;
        this.playOnce('Jump_Start', { ts: 1.5 });
      }
      attack() { this.act(this.def.attack); }
      specialMove() { this.act(this.def.special); }
      act(move) {
        if (this.busy || !this.ready) return;
        this.onDone = null; // cancel a pending cheer callback if interrupting
        this.mode = 'acting';
        this.actKind = move.kind || 'strike';
        this.actT = 0;
        this.boltFired = false;
        this.actMove = move;
        this.playOnce(move.clip, { ts: move.ts, onDone: () => this.endAct() });
        if (move.kind === 'smoke') {
          // vanish shortly after the throw begins
          this.smokeAt = 0.45;
          if (this.throwable) this.throwable.visible = true;
        }
      }
      endAct() {
        this.mode = this.mode === 'acting' ? (this.loopName === 'Running_A' ? 'run' : 'idle') : this.mode;
        this.lungeX = 0;
        this.resumeLoop();
      }
      hit() {
        if (this.busy) return;
        this.mode = 'acting';
        this.actKind = 'hit';
        addShake(0.05);
        this.playOnce(Math.random() < 0.5 ? 'Hit_A' : 'Hit_B', { ts: 1.2, onDone: () => this.endAct() });
      }
      ko() {
        if (this.busy) return;
        this.mode = 'acting';
        this.actKind = 'ko';
        addShake(0.1);
        this.playOnce(Math.random() < 0.5 ? 'Death_A' : 'Death_B', {
          onDone: () => {
            this.waitT = 0.9;
            this.waitNext = () => this.playOnce('Lie_StandUp', { ts: 1.2, onDone: () => this.endAct() });
          },
        });
      }
      cheer() {
        if (this.busy || !this.ready) return;
        this.mode = 'acting';
        this.actKind = 'cheer';
        this.playOnce('Cheer', { ts: 1.1, onDone: () => this.endAct() });
      }
      idle() {
        if (this.mode === 'jump' || !this.ready) return;
        this.mode = 'idle';
        this.onDone = null;
        this.waitT = 0;
        this.resumeLoop();
      }

      update(dt, t) {
        if (!this.ready) return;
        this.mixer.update(dt);

        if (this.waitT > 0) {
          this.waitT -= dt;
          if (this.waitT <= 0 && this.waitNext) { const f = this.waitNext; this.waitNext = null; f(); }
        }

        // facing yaw — stronger profile while running
        const yawTarget = this.facing * (this.mode === 'run' ? 1.15 : 0.35);
        this.root.rotation.y = damp(this.root.rotation.y, yawTarget, 7, dt);

        if (this.mode === 'run') {
          this.posX += this.facing * this.def.runSpeed * dt;
          if (this.posX > this.homeX + this.walkRange) { this.posX = this.homeX + this.walkRange; this.facing = -1; }
          if (this.posX < this.homeX - this.walkRange) { this.posX = this.homeX - this.walkRange; this.facing = 1; }
        }

        if (this.mode === 'jump') {
          this.root.position.y += this.vy * dt;
          this.vy -= 16 * dt;
          if (this.vy < 0 && this.loopName !== 'Jump_Idle') this.playLoop('Jump_Idle', 0.2);
          if (this.root.position.y <= 0 && this.vy < 0) {
            this.root.position.y = 0;
            this.mode = this.loopName === 'Running_A' ? 'run' : 'idle';
            dustRing(this.root.position, 0xcfd4e0, 2.2);
            this.playOnce('Jump_Land', { ts: 1.6, onDone: () => this.endAct() });
            this.mode = 'acting';
            this.actKind = 'landing';
          }
        }

        if (this.mode === 'acting') {
          this.actT += dt;
          const move = this.actMove;
          if (this.actKind === 'whirlwind') {
            this.posX = clamp(this.posX + this.facing * 2.0 * dt, this.homeX - this.walkRange, this.homeX + this.walkRange);
            if (this.actT > 0.5 && Math.floor(this.actT * 9) % 3 === 0) addShake(0.015);
          }
          if (this.actKind === 'bash') {
            this.lungeX = this.facing * 0.5 * Math.sin(clamp(this.actT / 0.55, 0, 1) * Math.PI);
          }
          if (this.actKind === 'cast' && !this.boltFired && this.actT >= move.boltAt) {
            this.boltFired = true;
            const start = new THREE.Vector3(this.root.position.x + this.facing * 0.55, 1.25, 0);
            magicBolt(start, this.facing, this.def.color, move.boltR);
            puffBurst(start, this.def.color, 6, 1.4, 0.05, 0.35);
          }
          if (this.actKind === 'smoke' && this.smokeAt !== undefined && this.actT >= this.smokeAt) {
            this.smokeAt = undefined;
            if (this.throwable) this.throwable.visible = false;
            puffBurst(new THREE.Vector3(this.root.position.x, 0.7, 0), 0x9aa1b9, 16, 1.6, 0.22, 0.9);
            this.ghostT = 1.1;
          }
        }

        // smoke-bomb invisibility
        if (this.ghostT > 0) {
          this.ghostT -= dt;
          const ghost = this.ghostT > 0;
          for (const m of this.mats) {
            m.transparent = true;
            m.opacity = ghost ? 0.22 : 1;
          }
        }

        this.root.position.x = this.posX + this.lungeX;
      }
    }

    // ============================================================ UI + boot
    const adventurers = ROSTER.map((def, i) => new Adventurer(def, HOMES[i]));
    let selected = 0;

    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85, side: THREE.DoubleSide });
    const selRing = new THREE.Mesh(new THREE.RingGeometry(0.55, 0.65, 40), ringMat);
    selRing.rotation.x = -Math.PI / 2;
    selRing.position.y = 0.02;
    scene.add(selRing);

    const controls = document.getElementById('controls');
    const charButtons = adventurers.map((a, i) => {
      const b = document.createElement('button');
      b.innerHTML = `<span class="dot" style="background:#${a.def.color.toString(16).padStart(6, '0')}"></span>${a.def.name}`;
      b.onclick = () => select(i, true);
      controls.appendChild(b);
      return b;
    });
    controls.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));
    for (const [label, fn] of [
      ['Run', () => adventurers[selected].toggleRun()],
      ['Jump', () => adventurers[selected].jump()],
      ['Attack', () => adventurers[selected].attack()],
      ['Special', () => adventurers[selected].specialMove()],
      ['Hit', () => adventurers[selected].hit()],
      ['KO', () => adventurers[selected].ko()],
      ['Idle', () => adventurers[selected].idle()],
    ]) {
      const b = document.createElement('button');
      b.textContent = label;
      b.onclick = fn;
      controls.appendChild(b);
    }

    function select(i, withCheer = false) {
      selected = i;
      charButtons.forEach((b, j) => b.classList.toggle('selected', j === i));
      const d = adventurers[i].def;
      const hex = `#${d.color.toString(16).padStart(6, '0')}`;
      document.getElementById('charName').textContent = d.name;
      document.getElementById('charName').style.color = hex;
      document.getElementById('charRole').textContent = d.role;
      document.getElementById('charRole').style.color = hex;
      document.getElementById('charNotes').innerHTML = d.notes.map((n) => `<li>${n}</li>`).join('');
      ringMat.color.setHex(d.color);
      if (withCheer) adventurers[i].cheer();
    }

    document.addEventListener('keydown', (e) => {
      const a = adventurers[selected];
      if (e.code === 'Digit1') select(0, true);
      if (e.code === 'Digit2') select(1, true);
      if (e.code === 'Digit3') select(2, true);
      if (e.code === 'Digit4') select(3, true);
      if (e.code === 'Space') { e.preventDefault(); a.jump(); }
      if (e.code === 'KeyF') a.attack();
      if (e.code === 'KeyG') a.specialMove();
      if (e.code === 'KeyR') a.toggleRun();
      if (e.code === 'KeyH') a.hit();
      if (e.code === 'KeyK') a.ko();
      if (e.code === 'KeyX') a.idle();
    });

    const loader = new THREE.GLTFLoader();
    Promise.all(adventurers.map((a) => a.load(loader)))
      .then(() => document.getElementById('loading').remove())
      .catch((err) => { document.getElementById('loading').textContent = 'Failed to load: ' + err; });

    select(0);

    // ============================================================ loop
    const clock = new THREE.Clock();
    function loop() {
      requestAnimationFrame(loop);
      const dt = Math.min(clock.getDelta(), 0.05);
      const t = clock.elapsedTime;

      for (const a of adventurers) a.update(dt, t);
      updateEffects(dt);

      const sel = adventurers[selected];
      selRing.position.x = damp(selRing.position.x, sel.root.position.x, 12, dt);
      const pulse = 1 + Math.sin(t * 4) * 0.05;
      selRing.scale.set(pulse, pulse, pulse);

      shake = damp(shake, 0, 6, dt);
      camera.position.x = Math.sin(t * 0.13) * 0.35 + (Math.random() - 0.5) * shake;
      camera.position.y = 2.7 + (Math.random() - 0.5) * shake;
      camera.lookAt(0, 1.05, 0);

      renderer.render(scene, camera);
    }
    loop();
  </script>
</body>
</html>
