<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smash</title>
    <style>
      body { margin: 0; overflow: hidden; background: #12141f; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
      canvas { display: block; }

      #startMenu {
        position: fixed; inset: 0; z-index: 10;
        background: radial-gradient(ellipse at 50% 30%, #1c2033 0%, #12141f 70%);
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 26px;
        color: #e8eaf2;
      }
      #startMenu h1 { margin: 0; font-size: 44px; letter-spacing: 10px; }
      #startMenu .sub { margin: -16px 0 0; font-size: 13px; color: #9aa1b9; letter-spacing: 3px; text-transform: uppercase; }
      #charGrid { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; max-width: 980px; }
      .charCard {
        width: 205px; padding: 16px 16px 14px; border-radius: 14px; cursor: pointer;
        background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1);
        transition: transform 0.12s, border-color 0.12s, background 0.12s;
      }
      .charCard:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.09); }
      .charCard.selected { border-color: var(--accent); background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 22px color-mix(in srgb, var(--accent) 35%, transparent); }
      .charCard h2 { margin: 0; font-size: 19px; color: var(--accent); }
      .charCard .role { margin: 2px 0 9px; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--accent); opacity: 0.85; }
      .charCard ul { margin: 0; padding-left: 16px; font-size: 12px; line-height: 1.5; color: #c3c8d9; }
      .charCard .key { float: right; font-size: 12px; color: #8e95ad; border: 1px solid #3a405a; border-radius: 5px; padding: 0 6px; }
      #startButton {
        font: 700 17px system-ui, sans-serif; letter-spacing: 2px; color: #12141f; cursor: pointer;
        background: #e8eaf2; border: none; border-radius: 10px; padding: 13px 46px;
        transition: transform 0.08s, background 0.12s;
      }
      #startButton:hover { background: #ffffff; transform: scale(1.04); }
      #controlsHint { font-size: 12px; color: #8e95ad; letter-spacing: 0.5px; }

      #hud {
        position: fixed; top: 16px; left: 16px; z-index: 5;
        color: #e8eaf2; background: rgba(16, 18, 30, 0.6); border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.09); padding: 10px 16px; min-width: 150px;
      }
      .hudRow { display: flex; justify-content: space-between; gap: 18px; font-size: 14px; line-height: 1.7; }
      .hudName { font-weight: 600; }
      .hudPct { font-weight: 800; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="lib/GLTFLoader.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <div id="startMenu">
      <h1>SMASH</h1>
      <p class="sub">choose your fighter</p>
      <div id="charGrid"></div>
      <button id="startButton">FIGHT</button>
      <p id="controlsHint">←→ / AD move &nbsp;·&nbsp; Space jump (×2) &nbsp;·&nbsp; F attack &nbsp;·&nbsp; G special &nbsp;·&nbsp; add ?training to the URL for a practice dummy</p>
    </div>

    <div id="hud" style="display: none;"></div>

    <script type="module" src="index.js"></script>
  </body>
</html>
