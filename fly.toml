# fly.toml app configuration file generated for riftbrawl on 2026-06-11T20:03:43-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'riftbrawl'
primary_region = 'ord'

[build]

# Accounts + social graph now live in Supabase, so there's no persistent volume.
# Set the Supabase credentials as secrets (kept out of this file):
#   fly secrets set SUPABASE_URL=... SUPABASE_ANON_KEY=... SUPABASE_SERVICE_ROLE_KEY=...

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 2000
    soft_limit = 1500

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '3s'
    grace_period = '10s'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
