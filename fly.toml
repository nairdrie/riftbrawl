# fly launch will offer to tweak this; the important bits are below.
#
#   fly launch --no-deploy     # creates the app, keeps this config
#   fly volumes create smash_data --size 1
#   fly deploy
#
# IMPORTANT: this is a stateful single-instance app (sessions, rooms and the
# matchmaking queue live in process memory). Keep exactly ONE machine —
# multiple machines would split players into separate universes.

app = "riftbrawl"
primary_region = "ord"   # pick the region closest to your players

[build]

[env]
  SMASH_DATA_DIR = "/data"

[mounts]
  source = "smash_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # never scale to zero or above one — websockets + in-memory state
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 2000
    soft_limit = 1500

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/healthz"
    interval = "30s"
    timeout = "3s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
